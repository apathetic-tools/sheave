# .github/dependabot.yml
version: 2
updates:
  # Monitor GitHub Actions for updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    # Keeps actions like actions/checkout, actions/setup-python up to date

  # Monitor Go dependencies in go.mod
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    # Monitors dependencies: cobra, go-toml, etc.
